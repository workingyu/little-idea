<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>最后一句话</title>

</head>

<body>

    <div id="box">
        <h2>如果这是你留在世界上的最后一句话</h2>
        <h2>你会写什么？</h2>
        <input id="msg">
        <button onclick="send()">留下</button>

        <table border="2">
            <tbody  id="memoryTable">
                <tr>
                    <td> AAAA </td>
                    <td> BBBB </td>
                </tr>
                <tr>
                    <td> A2A2 </td>
                    <td> B2B2 </td>
                </tr>
            </tbody id="memoryTable">
        </table>
    </div>

    <script>

        let memories=[];

        function send(){
        let text=document.getElementById("msg").value;

        if(!text) return;
                
        memories.push(text);
                
        let tbody=document.getElementById("memoryTable");
                
        let row=document.createElement("tr");
                
        row.innerHTML=`
            <td>${memories.length}</td>
            <td>${text}</td>
        `;
                
        tbody.appendChild(row);

        let p=document.createElement("div");

        p.innerText=text;

        document.getElementById("msg").value="";


        p.style.position="absolute";
        p.style.left="50%";
        p.style.top="60%";

        p.style.whiteSpace="nowrap";

        document.body.appendChild(p);

        let y=60;

        let timer=setInterval(()=>{

        y-=1;

        p.style.top=y+"%";

        p.style.opacity=y/60;

        if(y<0){

        clearInterval(timer);

        p.remove();

        }

        },50);

        document.getElementById("msg").value="";
        }

        setInterval(()=>{

        if(memories.length===0) return;

        let text=
        memories[
        Math.floor(Math.random()*memories.length)
        ];

        let star=document.createElement("div");

        star.innerText=text;

        star.style.position="absolute";
        star.style.left=Math.random()*80+"%";
        star.style.top=Math.random()*80+"%";

        document.body.appendChild(star);

        setTimeout(()=>{
        star.remove();
        },2000);

        },30000);

    </script>

</body>
</html>
